name: PR Validation

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  # ── Stage 1: Tests unitarios (workflow reutilizable)
  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/unit-tests.yml
    with:
      node-version: "22"

  # ── Stage 2: Build & Type-check (requiere tests OK)
  validate:
    name: Build & Type-check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
